keys:
  - &desk 
  - &server 
  - &vps 
  - &framework 
creation_rules:
  - path_regex: sops/digiboksi/[^/]+$
    key_groups:
      - age:
          - *desk
          - *framework
  - path_regex: hosts/uwu/secrets/[^/]+$
    key_groups:
      - age:
          - *desk
          - *framework
          - *server
  - path_regex: hosts/server2/secrets/[^/]+$
    key_groups:
      - age:
          - *desk
          - *framework
          - *server
  - path_regex: hosts/vps/secrets/[^/]+$
    key_groups:
      - age:
          - *desk
          - *vps
          - *framework
  - path_regex: sops/wireguard/[^/]+$
    key_groups:
      - age:
          - *desk
          - *vps
          - *server
          - *framework
  - path_regex: certs/[^/]+$
    key_groups:
      - age:
          - *desk
          - *framework
          - *server
  - path_regex: sops/desk/[^/]+$
    key_groups:
      - age:
          - *desk
